# Nginx 配置模板
# 部署路径: /etc/nginx/sites-available/beverage
# 启用: ln -s /etc/nginx/sites-available/beverage /etc/nginx/sites-enabled/
# 测试: nginx -t
# 重载: nginx -s reload

# === 简易版（无域名，通过 IP + 端口访问） ===
# 如果暂时没有域名，无需 Nginx，用 PM2 直接暴露端口即可
# 只需确保云服务器防火墙放行 3000 端口

# === 完整版（有域名后使用） ===
server {
    listen 80;
    server_name your-domain.com;   # 替换为你的域名

    # 管理后台静态文件
    location /admin {
        alias /opt/beverage-order/admin/dist;
        try_files $uri $uri/ /admin/index.html;
        index index.html;
    }

    # API 反向代理
    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSocket 支持
    location /ws {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 上传文件
    location /uploads {
        alias /opt/beverage-order/uploads;
    }
}

